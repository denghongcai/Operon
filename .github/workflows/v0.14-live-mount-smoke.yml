name: v0.14 Live Mount Smoke

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Live mount platform to smoke"
        type: choice
        required: true
        default: all
        options:
          - all
          - macos
          - windows

permissions:
  contents: read

jobs:
  macos-live-mount:
    name: macOS macFUSE Live Mount
    if: ${{ inputs.platform == 'all' || inputs.platform == 'macos' }}
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: v014-live-mount-macos

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.3"
          repo-token: ${{ github.token }}

      - name: Install macFUSE
        run: brew install --cask macfuse

      - name: Run macOS live mount smoke
        run: scripts/smoke-v0.14-macos-live-mount.sh

  windows-live-mount:
    name: Windows WinFsp Live Mount
    if: ${{ inputs.platform == 'all' || inputs.platform == 'windows' }}
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: v014-live-mount-windows

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.3"
          repo-token: ${{ github.token }}

      - name: Install WinFsp
        shell: powershell
        run: choco install winfsp -y

      - name: Run Windows live mount smoke
        shell: powershell
        run: scripts/smoke-v0.14-windows-live-mount.ps1
