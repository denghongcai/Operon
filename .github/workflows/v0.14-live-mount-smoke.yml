name: v0.14 Live Mount Smoke

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Live mount platform to smoke"
        type: choice
        required: true
        default: all
        options:
          - all
          - macos
          - macos-fuse-zip
          - windows
      macos_backend:
        description: "FUSE-T backend for macOS smoke"
        type: choice
        required: true
        default: nfs
        options:
          - nfs
          - smb
          - fskit
      macos_runner:
        description: "macOS runner for live mount smoke"
        type: choice
        required: true
        default: hosted
        options:
          - hosted
          - self-hosted-fuse-t
      macos_options:
        description: "Optional comma-separated FUSE-T -o options for macOS smoke"
        type: string
        required: false
        default: ""

permissions:
  contents: read

jobs:
  macos-hosted-live-mount:
    name: macOS FUSE-T Live Mount (hosted)
    if: ${{ (inputs.platform == 'all' || inputs.platform == 'macos') && inputs.macos_runner == 'hosted' }}
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: v014-live-mount-macos

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.3"
          repo-token: ${{ github.token }}

      - name: Install FUSE-T
        run: scripts/install-v0.14-macos-fuse-t.sh

      - name: Run macOS live mount smoke
        id: macos-smoke
        env:
          OPERON_MOUNT_MACOS_BACKEND: ${{ inputs.macos_backend }}
          OPERON_MOUNT_MACOS_OPTIONS: ${{ inputs.macos_options }}
        run: |
          set -o pipefail
          log_path="$RUNNER_TEMP/v0.14-macos-live-mount-${OPERON_MOUNT_MACOS_BACKEND}.log"
          echo "macOS live mount backend: ${OPERON_MOUNT_MACOS_BACKEND}"
          echo "macOS live mount extra options: ${OPERON_MOUNT_MACOS_OPTIONS:-<none>}"
          echo "macOS live mount log: ${log_path}"
          set +e
          scripts/smoke-v0.14-macos-live-mount.sh 2>&1 | tee "$log_path"
          status=${PIPESTATUS[0]}
          set -e
          echo "macOS live mount smoke exit code: ${status}"
          exit "$status"

      - name: Upload macOS live mount smoke log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: v0.14-macos-live-mount-${{ inputs.macos_backend }}-${{ github.run_id }}
          path: ${{ runner.temp }}/v0.14-macos-live-mount-${{ inputs.macos_backend }}.log
          if-no-files-found: warn

  macos-self-hosted-live-mount:
    name: macOS FUSE-T Live Mount (self-hosted)
    if: ${{ (inputs.platform == 'all' || inputs.platform == 'macos') && inputs.macos_runner == 'self-hosted-fuse-t' }}
    runs-on: [self-hosted, macOS, fuse-t]
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: v014-live-mount-macos-self-hosted

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.3"
          repo-token: ${{ github.token }}

      - name: Check FUSE-T runtime
        env:
          OPERON_MOUNT_MACOS_BACKEND: ${{ inputs.macos_backend }}
        run: |
          scripts/preflight-v0.14-macos-fuse-t-host.sh

      - name: Run macOS live mount smoke
        id: macos-smoke
        env:
          OPERON_MOUNT_MACOS_BACKEND: ${{ inputs.macos_backend }}
          OPERON_MOUNT_MACOS_OPTIONS: ${{ inputs.macos_options }}
        run: |
          set -o pipefail
          log_path="$RUNNER_TEMP/v0.14-macos-live-mount-${OPERON_MOUNT_MACOS_BACKEND}.log"
          echo "macOS live mount backend: ${OPERON_MOUNT_MACOS_BACKEND}"
          echo "macOS live mount extra options: ${OPERON_MOUNT_MACOS_OPTIONS:-<none>}"
          echo "macOS live mount log: ${log_path}"
          set +e
          scripts/smoke-v0.14-macos-live-mount.sh 2>&1 | tee "$log_path"
          status=${PIPESTATUS[0]}
          set -e
          echo "macOS live mount smoke exit code: ${status}"
          exit "$status"

      - name: Upload macOS live mount smoke log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: v0.14-macos-live-mount-${{ inputs.macos_backend }}-${{ github.run_id }}
          path: ${{ runner.temp }}/v0.14-macos-live-mount-${{ inputs.macos_backend }}.log
          if-no-files-found: warn

  windows-live-mount:
    name: Windows WinFsp Live Mount
    if: ${{ inputs.platform == 'all' || inputs.platform == 'windows' }}
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: v014-live-mount-windows

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.3"
          repo-token: ${{ github.token }}

      - name: Install WinFsp
        shell: powershell
        run: choco install winfsp -y

      - name: Run Windows live mount smoke
        shell: powershell
        run: scripts/smoke-v0.14-windows-live-mount.ps1

  macos-fuse-zip-probe:
    name: macOS FUSE-T fuse-zip Probe (hosted)
    if: ${{ inputs.platform == 'all' || inputs.platform == 'macos-fuse-zip' }}
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install FUSE-T
        run: scripts/install-v0.14-macos-fuse-t.sh

      - name: Install fuse-zip dependencies
        run: brew install libzip

      - name: Run fuse-zip probe
        id: fuse-zip-probe
        env:
          OPERON_MOUNT_MACOS_BACKEND: ${{ inputs.macos_backend }}
          OPERON_MOUNT_MACOS_OPTIONS: ${{ inputs.macos_options }}
        run: |
          set -o pipefail
          log_path="$RUNNER_TEMP/v0.14-macos-fuse-zip-${OPERON_MOUNT_MACOS_BACKEND}.log"
          echo "macOS fuse-zip probe backend: ${OPERON_MOUNT_MACOS_BACKEND}"
          echo "macOS fuse-zip probe extra options: ${OPERON_MOUNT_MACOS_OPTIONS:-<none>}"
          echo "macOS fuse-zip probe log: ${log_path}"
          set +e
          scripts/smoke-v0.14-macos-fuse-zip-probe.sh 2>&1 | tee "$log_path"
          status=${PIPESTATUS[0]}
          set -e
          echo "macOS FUSE-T fuse-zip probe exit code: ${status}"
          exit "$status"

      - name: Upload macOS fuse-zip probe log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: v0.14-macos-fuse-zip-${{ inputs.macos_backend }}-${{ github.run_id }}
          path: ${{ runner.temp }}/v0.14-macos-fuse-zip-${{ inputs.macos_backend }}.log
          if-no-files-found: warn
