name: Verify Release Install Usability

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Public release tag to verify, for example v0.16.6"
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify-release-install-usability:
    name: Verify Release Install Usability (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify release install usability
        shell: bash
        run: scripts/verify-release-install-usability.sh "${{ inputs.tag }}" "${{ github.repository }}"

  verify-linux-install-containers:
    name: Verify Linux Install Containers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify Linux release install containers
        shell: bash
        run: scripts/verify-release-linux-install-containers.sh "${{ inputs.tag }}" "${{ github.repository }}"
