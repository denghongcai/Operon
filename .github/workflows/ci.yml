name: CI

on:
  pull_request:
  push:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Check
        run: cargo check --workspace --locked

      - name: Test
        run: cargo test --workspace --locked

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --locked -- -D warnings

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm -r test

  validation:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs:
      - rust
      - typescript
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: v0.5 Docker Validation
            script: scripts/verify-v0.5-docker.sh
          - name: v0.6 Linux Mount Validation
            script: scripts/verify-v0.6-linux-mount.sh
          - name: v0.6.1 Linux Write Mount Validation
            script: scripts/verify-v0.6.1-linux-write-mount.sh
          - name: v0.6.2 CLI FS Cleanup Validation
            script: scripts/verify-v0.6.2-cli-fs-cleanup.sh
          - name: v0.6.3 FS Copy Validation
            script: scripts/verify-v0.6.3-fs-copy.sh
          - name: v0.6.4/v0.6.5 Onboard and Unified Config Validation
            script: scripts/verify-v0.6.4-onboard.sh
          - name: v0.6.7/v0.6.8 Runtime and Protocol Validation
            script: scripts/verify-v0.6.7-runtime.sh
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Run validation
        run: ${{ matrix.script }}
