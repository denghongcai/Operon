name: CI

on:
  pull_request:
  push:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Check
        run: cargo check --workspace --locked

      - name: Test
        run: cargo test --workspace --locked

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --locked -- -D warnings

  rust-platform-smoke:
    name: Rust Platform Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust-${{ runner.os }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.3"
          repo-token: ${{ github.token }}

      - name: Check workspace
        run: cargo check --workspace --locked

      - name: Test protocol
        run: cargo test -p operon-protocol --locked

      - name: Test config
        run: cargo test -p operon-config --locked

      - name: Test filesystem core
        run: cargo test -p operon-fs --locked

      - name: Test exec policy
        run: cargo test -p operon-process --locked

      - name: Test daemon platform shell defaults
        run: cargo test -p operond --locked shell_invocation_matches_platform

      - name: Test daemon PTY smoke
        if: runner.os != 'Windows'
        run: cargo test -p operond --locked exec_session_portable_pty_smoke_outputs_and_exits

      - name: Test daemon exec cancellation guarantee
        run: cargo test -p operond --locked exec_cancellation_guarantee_matches_platform

      - name: Test daemon Windows Job Object cancellation
        if: runner.os == 'Windows'
        run: cargo test -p operond --locked windows_job_object_cancellation_terminates_descendant_process

      - name: Test CLI private file platform model
        run: cargo test -p operon-cli --locked private_file_security_model_is_platform_specific

      - name: Test CLI session dimensions
        run: cargo test -p operon-cli --locked exec_session_terminal_dimensions

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm -r test

  validation:
    name: Validation
    runs-on: ubuntu-latest
    needs:
      - rust
      - typescript
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust

      - name: Install validation tools
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler ripgrep

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Run validations
        run: scripts/ci/run-validations.sh
