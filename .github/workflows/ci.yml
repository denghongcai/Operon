name: CI

on:
  pull_request:
  push:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Check
        run: cargo check --workspace --locked

      - name: Test
        run: cargo test --workspace --locked

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --locked -- -D warnings

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm -r test

  validation:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs:
      - rust
      - typescript
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: v0.5 Docker Validation
            script: scripts/verify-v0.5-docker.sh
          - name: v0.6 Linux Mount Validation
            script: scripts/verify-v0.6-linux-mount.sh
          - name: v0.6.1 Linux Write Mount Validation
            script: scripts/verify-v0.6.1-linux-write-mount.sh
          - name: v0.6.2 CLI FS Cleanup Validation
            script: scripts/verify-v0.6.2-cli-fs-cleanup.sh
          - name: v0.6.3 FS Copy Validation
            script: scripts/verify-v0.6.3-fs-copy.sh
          - name: v0.6.4/v0.6.5 Onboard and Unified Config Validation
            script: scripts/verify-v0.6.4-onboard.sh
          - name: v0.6.7/v0.6.8/v0.6.12 Runtime and Protocol Validation
            script: scripts/verify-v0.6.7-runtime.sh
          - name: v0.6.9 CLI Contract Validation
            script: scripts/verify-v0.6.9-cli-contract.sh
          - name: v0.6.10 Runtime Hardening Validation
            script: scripts/verify-v0.6.10-runtime-hardening.sh
          - name: v0.6.11 Governance Validation
            script: scripts/verify-v0.6.11-governance.sh
          - name: v0.6.12 Runtime Boundary Validation
            script: scripts/verify-v0.6.12-runtime-boundary.sh
            node: true
          - name: v0.7 Service Forwarding Validation
            script: scripts/verify-v0.7-service-forwarding.sh
          - name: v0.7.1 UDP Datagram Forwarding Validation
            script: scripts/verify-v0.7.1-udp-datagram-forwarding.sh
          - name: v0.8 Agent Skills Validation
            script: scripts/verify-v0.8-agent-skills.sh
          - name: v0.8.1 Integration Coverage Validation
            script: scripts/verify-v0.8.1-integration-coverage.sh
          - name: v0.8.3 Read Range and Release Cleanup Validation
            script: scripts/verify-v0.8.3-read-range-release-cleanup.sh
            node: true
          - name: v0.8.4 Modularization Validation
            script: scripts/verify-v0.8.4-modularization.sh
          - name: v0.8.5 Core Domain Module Validation
            script: scripts/verify-v0.8.5-core-domain-modules.sh
          - name: v0.8.6 Runtime CLI Client Modularization Validation
            script: scripts/verify-v0.8.6-runtime-cli-client-modularization.sh
            node: true
          - name: Docs Help Skills Sync Validation
            script: scripts/verify-docs-help-skills-sync.sh
          - name: v0.9 Endpoint Model Validation
            script: scripts/verify-v0.9-endpoint-model.sh
          - name: Post-v0.9 Discovery UX Validation
            script: scripts/verify-post-v0.9-discovery-ux.sh
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust

      - name: Install validation tools
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler ripgrep

      - name: Setup pnpm
        if: ${{ matrix.node == true }}
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - name: Setup Node
        if: ${{ matrix.node == true }}
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Node dependencies
        if: ${{ matrix.node == true }}
        run: pnpm install --frozen-lockfile

      - name: Run validation
        run: ${{ matrix.script }}
