name: CI

on:
  pull_request:
  push:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Check
        run: cargo check --workspace --locked

      - name: Test
        run: cargo test --workspace --locked

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --locked -- -D warnings

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm -r test

  v05-docker:
    name: v0.5 Docker Validation
    runs-on: ubuntu-latest
    needs:
      - rust
      - typescript
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Validate v0.5 Docker demo
        run: scripts/verify-v0.5-docker.sh

  v06-linux-mount:
    name: v0.6 Linux Mount Validation
    runs-on: ubuntu-latest
    needs:
      - rust
      - typescript
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Validate v0.6 Linux mount
        run: scripts/verify-v0.6-linux-mount.sh

  v061-linux-write-mount:
    name: v0.6.1 Linux Write Mount Validation
    runs-on: ubuntu-latest
    needs:
      - rust
      - typescript
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Validate v0.6.1 Linux write mount
        run: scripts/verify-v0.6.1-linux-write-mount.sh

  v062-cli-fs-cleanup:
    name: v0.6.2 CLI FS Cleanup Validation
    runs-on: ubuntu-latest
    needs:
      - rust
      - typescript
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Validate v0.6.2 CLI fs cleanup
        run: scripts/verify-v0.6.2-cli-fs-cleanup.sh
