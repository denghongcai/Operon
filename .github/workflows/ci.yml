name: CI

on:
  pull_request:
  push:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Check
        run: cargo check --workspace --locked

      - name: Test
        run: cargo test --workspace --locked

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --locked -- -D warnings

  rust-platform-smoke:
    name: Rust Platform Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust-${{ runner.os }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.3"
          repo-token: ${{ github.token }}

      - name: Install WinFsp
        if: runner.os == 'Windows'
        shell: powershell
        run: choco install winfsp -y

      - name: Check workspace
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            cargo check --workspace --locked --features operon-mount/macos-no-mount
          else
            cargo check --workspace --locked
          fi

      - name: Test protocol
        run: cargo test -p operon-protocol --locked

      - name: Test config
        run: cargo test -p operon-config --locked

      - name: Test filesystem core
        run: cargo test -p operon-fs --locked

      - name: Test mount adapter
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            cargo test -p operon-mount --locked --features macos-no-mount
          else
            cargo test -p operon-mount --locked
          fi

      - name: Test exec policy
        run: cargo test -p operon-process --locked

      - name: Test daemon platform shell defaults
        run: cargo test -p operond --locked shell_invocation_matches_platform

      - name: Test daemon exec session support decision
        run: cargo test -p operond --locked exec_session_platform_is_supported

      - name: Test daemon PTY smoke
        run: cargo test -p operond --locked exec_session_portable_pty_smoke_outputs_and_exits

      - name: Test daemon exec cancellation guarantee
        run: cargo test -p operond --locked exec_cancellation_guarantee_matches_platform

      - name: Test daemon Windows Job Object cancellation
        if: runner.os == 'Windows'
        run: cargo test -p operond --locked windows_job_object_cancellation_terminates_descendant_process

      - name: Test daemon service management
        run: cargo test -p operond --locked service_management

      - name: Test CLI private file platform model
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            cargo test -p operon-cli --locked --features operon-mount/macos-no-mount private_file_security_model_is_platform_specific
          else
            cargo test -p operon-cli --locked private_file_security_model_is_platform_specific
          fi

      - name: Test CLI Windows private file ACL model
        if: runner.os == 'Windows'
        run: cargo test -p operon-cli --locked windows_private_file_acl_model

      - name: Test CLI Windows private file ACL write
        if: runner.os == 'Windows'
        run: cargo test -p operon-cli --locked windows_private_file_is_written_with_verified_acl

      - name: Test CLI session dimensions
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            cargo test -p operon-cli --locked --features operon-mount/macos-no-mount exec_session_terminal_dimensions
          else
            cargo test -p operon-cli --locked exec_session_terminal_dimensions
          fi

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm -r test

  validation:
    name: Validation (${{ matrix.group }})
    runs-on: ubuntu-latest
    needs:
      - rust
      - typescript
    strategy:
      fail-fast: false
      matrix:
        group:
          - core
          - runtime
          - sdk
          - linux-system
    env:
      OPERON_SKIP_SDK_TESTS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust

      - name: Install validation tools
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler ripgrep

      - name: Run validations
        run: scripts/ci/run-validations.sh "${{ matrix.group }}"
