name: Draft Release

on:
  push:
    tags:
      - "v*"

permissions:
  actions: read
  contents: write

jobs:
  release-gate:
    name: Release Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify release gates
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/verify-release-gates.sh "$GITHUB_REF_NAME" "$GITHUB_SHA" "$GITHUB_REPOSITORY"

  build-rust-linux:
    name: Build Rust Linux (${{ matrix.arch }})
    needs: release-gate
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
    env:
      PROTOC_VERSION: "25.3"
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: linux-x86_64
            packages: ""
          - target: aarch64-unknown-linux-gnu
            arch: linux-arm64
            packages: gcc-aarch64-linux-gnu
          - target: armv7-unknown-linux-gnueabihf
            arch: linux-armv7
            packages: gcc-arm-linux-gnueabihf
    steps:
      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          packages="${{ matrix.packages }}"

          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            ca-certificates \
            curl \
            git \
            pkg-config \
            unzip \
            ${packages}

          curl -fsSLo /tmp/protoc.zip \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          unzip -q -o /tmp/protoc.zip -d /usr/local bin/protoc 'include/*'
          protoc --version

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Install Rust target
        run: rustup target add "${{ matrix.target }}"

      - name: Build Rust binaries
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CC_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-gcc
          PKG_CONFIG_ALLOW_CROSS: "1"
        run: cargo build --release --locked --target "${{ matrix.target }}" -p operon-cli -p operond

      - name: Validate GLIBC baseline
        shell: bash
        run: |
          set -euo pipefail
          scripts/verify-release-glibc-baseline.sh \
            "target/${{ matrix.target }}/release/operon" \
            "target/${{ matrix.target }}/release/operond"

      - name: Package Rust binaries
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          target="${{ matrix.target }}"
          arch="${{ matrix.arch }}"
          dist_dir="$PWD/dist"
          binary_dir="$dist_dir/operon-${tag}-${arch}"

          rm -rf "$dist_dir"
          mkdir -p "$binary_dir"
          cp "target/$target/release/operon" "$binary_dir/operon"
          cp "target/$target/release/operond" "$binary_dir/operond"
          cp README.md PROTOCOL.md "$binary_dir/"
          if [[ -f LICENSE ]]; then
            cp LICENSE "$binary_dir/"
          fi

          tar -C "$dist_dir" -czf "$dist_dir/operon-${tag}-${arch}.tar.gz" "operon-${tag}-${arch}"

      - name: Smoke release archive
        shell: bash
        run: |
          set -euo pipefail

          archive="dist/operon-${GITHUB_REF_NAME}-${{ matrix.arch }}.tar.gz"
          if [[ "${{ matrix.arch }}" == "linux-x86_64" ]]; then
            scripts/smoke-release-archive.sh "$archive"
          else
            scripts/smoke-release-archive.sh --no-run "$archive"
          fi

      - name: Upload Rust archive
        uses: actions/upload-artifact@v7
        with:
          name: operon-${{ github.ref_name }}-${{ matrix.arch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  build-rust-native:
    name: Build Rust Native (${{ matrix.arch }})
    needs: release-gate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            target: x86_64-apple-darwin
            arch: macos-x86_64
            archive: tar
            binary_suffix: ""
          - os: macos-15
            target: aarch64-apple-darwin
            arch: macos-aarch64
            archive: tar
            binary_suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            arch: windows-x86_64
            archive: zip
            binary_suffix: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.3"
          repo-token: ${{ github.token }}

      - name: Install FUSE-T build dependency
        if: runner.os == 'macOS'
        shell: bash
        run: scripts/install-macos-fuse-t.sh

      - name: Install WinFsp build dependency
        if: runner.os == 'Windows'
        shell: powershell
        run: choco install winfsp -y

      - name: Install Rust target
        run: rustup target add "${{ matrix.target }}"

      - name: Build Rust binaries
        run: cargo build --release --locked --target "${{ matrix.target }}" -p operon-cli -p operond

      - name: Smoke Rust binaries
        shell: bash
        run: |
          set -euo pipefail
          suffix="${{ matrix.binary_suffix }}"
          target="${{ matrix.target }}"
          "target/$target/release/operon$suffix" --version
          "target/$target/release/operond$suffix" --version
          "target/$target/release/operon$suffix" --help >/dev/null
          "target/$target/release/operon$suffix" doctor --help >/dev/null
          "target/$target/release/operon$suffix" exec --help >/dev/null

      - name: Package Rust binaries
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          target="${{ matrix.target }}"
          arch="${{ matrix.arch }}"
          suffix="${{ matrix.binary_suffix }}"
          dist_dir="$PWD/dist"
          binary_dir="$dist_dir/operon-${tag}-${arch}"

          rm -rf "$dist_dir"
          mkdir -p "$binary_dir"
          cp "target/$target/release/operon$suffix" "$binary_dir/operon$suffix"
          cp "target/$target/release/operond$suffix" "$binary_dir/operond$suffix"
          cp README.md PROTOCOL.md "$binary_dir/"
          if [[ -f LICENSE ]]; then
            cp LICENSE "$binary_dir/"
          fi

          if [[ "${{ runner.os }}" == "macOS" ]]; then
            lib_path=""
            for candidate in \
              /usr/local/lib/libfuse-t.dylib \
              /opt/homebrew/lib/libfuse-t.dylib \
              "/Library/Application Support/fuse-t/lib/libfuse-t.dylib"
            do
              if [[ -f "$candidate" ]]; then
                lib_path="$candidate"
                break
              fi
            done

            if [[ -z "$lib_path" ]]; then
              echo "libfuse-t.dylib is required for macOS release packaging" >&2
              exit 1
            fi

            cp "$lib_path" "$binary_dir/libfuse-t.dylib"
            if ! otool -l "$binary_dir/operon$suffix" | grep -Fq "@executable_path"; then
              install_name_tool -add_rpath "@executable_path" "$binary_dir/operon$suffix"
            fi
            codesign --force --sign - "$binary_dir/operon$suffix" "$binary_dir/libfuse-t.dylib"
            "$binary_dir/operon$suffix" --version
          fi

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            (cd "$dist_dir" && python -m zipfile --create "operon-${tag}-${arch}.zip" "operon-${tag}-${arch}")
          else
            tar -C "$dist_dir" -czf "$dist_dir/operon-${tag}-${arch}.tar.gz" "operon-${tag}-${arch}"
          fi

      - name: Smoke release archive
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            archive="dist/operon-${GITHUB_REF_NAME}-${{ matrix.arch }}.zip"
          else
            archive="dist/operon-${GITHUB_REF_NAME}-${{ matrix.arch }}.tar.gz"
          fi
          scripts/smoke-release-archive.sh "$archive"

      - name: Upload Rust archive
        uses: actions/upload-artifact@v7
        with:
          name: operon-${{ github.ref_name }}-${{ matrix.arch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  build-sdk:
    name: Build TypeScript SDK
    needs: release-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install TypeScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript SDK
        run: pnpm --filter @operon/sdk build

      - name: Package TypeScript SDK
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          dist_dir="$PWD/dist"
          sdk_dir="$dist_dir/operon-sdk-js-${tag}"

          rm -rf "$dist_dir"
          mkdir -p "$sdk_dir"
          cp packages/sdk-js/package.json "$sdk_dir/package.json"
          cp -R packages/sdk-js/dist "$sdk_dir/dist"
          cp -R packages/sdk-js/src/generated "$sdk_dir/generated"
          tar -C "$dist_dir" -czf "$dist_dir/operon-sdk-js-${tag}.tar.gz" "operon-sdk-js-${tag}"

      - name: Upload SDK archive
        uses: actions/upload-artifact@v7
        with:
          name: operon-sdk-js-${{ github.ref_name }}
          path: dist/*.tar.gz
          if-no-files-found: error

  draft-release:
    name: Draft GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-rust-linux
      - build-rust-native
      - build-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download archives
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail

          cd "$PWD/dist"
          sha256sum *.tar.gz *.zip > SHA256SUMS

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --draft \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
