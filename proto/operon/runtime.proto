syntax = "proto3";

package operon.runtime.v1;

service OperonRuntime {
  rpc Health(HealthRequest) returns (HealthStatus);
  rpc GetNode(GetNodeRequest) returns (NodeInfo);
  rpc ListCapabilities(ListCapabilitiesRequest) returns (CapabilityList);
  rpc StatFs(FsPathRequest) returns (FsStat);
  rpc ListFs(FsPathRequest) returns (FsList);
  rpc ReadFile(FsPathRequest) returns (stream FileChunk);
  rpc WriteFile(stream WriteFileRequest) returns (FsWrite);
  rpc WriteFileRange(FsWriteRangeRequest) returns (FsWrite);
  rpc TruncateFs(FsTruncateRequest) returns (FsStat);
  rpc MkdirFs(FsPathRequest) returns (FsStat);
  rpc DeleteFs(FsPathRequest) returns (FsDelete);
  rpc RenameFs(FsRenameRequest) returns (FsRename);
  rpc CopyFs(FsCopyRequest) returns (FsCopy);
  rpc RunJob(JobRunRequest) returns (JobRecord);
  rpc GetJob(JobIdRequest) returns (JobRecord);
  rpc ListJobs(ListJobsRequest) returns (JobList);
  rpc WatchJob(JobIdRequest) returns (stream JobEvent);
  rpc ListJobLogs(JobIdRequest) returns (JobLogList);
  rpc StreamJobLogs(JobIdRequest) returns (stream JobLogStreamEvent);
  rpc WriteJobStdin(stream JobStdinRequest) returns (JobStdin);
  rpc CloseJobStdin(JobIdRequest) returns (JobStdinClose);
  rpc CancelJob(JobCancelRequest) returns (JobRecord);
  rpc ListServices(ListServicesRequest) returns (ServiceList);
  rpc CheckService(ServiceIdRequest) returns (ServiceCheck);
  rpc OpenServiceTunnel(stream ServiceTunnelRequest) returns (stream ServiceTunnelResponse);
  rpc OpenServiceDatagramTunnel(stream ServiceDatagramTunnelRequest) returns (stream ServiceDatagramTunnelResponse);
  rpc ListAudit(ListAuditRequest) returns (AuditLog);
}

message HealthRequest {}

message GetNodeRequest {}

message ListCapabilitiesRequest {
  uint32 page_size = 1;
  string page_token = 2;
}

message ListJobsRequest {
  uint32 page_size = 1;
  string page_token = 2;
}

message ListServicesRequest {
  uint32 page_size = 1;
  string page_token = 2;
}

message ListAuditRequest {
  uint32 page_size = 1;
  string page_token = 2;
}

enum CapabilityKind {
  CAPABILITY_KIND_UNSPECIFIED = 0;
  CAPABILITY_KIND_FS = 1;
  CAPABILITY_KIND_PROCESS = 2;
  CAPABILITY_KIND_JOB = 3;
  CAPABILITY_KIND_DEVICE_INFO = 4;
  CAPABILITY_KIND_SERVICE = 5;
}

enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  JOB_STATUS_RUNNING = 1;
  JOB_STATUS_SUCCEEDED = 2;
  JOB_STATUS_FAILED = 3;
  JOB_STATUS_CANCELLED = 4;
  JOB_STATUS_TIMED_OUT = 5;
}

enum ServiceProtocol {
  SERVICE_PROTOCOL_UNSPECIFIED = 0;
  SERVICE_PROTOCOL_TCP = 1;
  SERVICE_PROTOCOL_UDP = 2;
}

message HealthStatus {
  bool ok = 1;
  string node_id = 2;
  string version = 3;
}

message NodeInfo {
  string id = 1;
  string hostname = 2;
  string os = 3;
  string arch = 4;
}

message Capability {
  string id = 1;
  CapabilityKind kind = 2;
  string node_id = 3;
  string name = 4;
  repeated string permissions = 5;
  string description = 6;
}

message CapabilityList {
  repeated Capability capabilities = 1;
  string next_page_token = 2;
}

message FsPathRequest {
  string path = 1;
}

message FsStat {
  string path = 1;
  bool is_file = 2;
  bool is_dir = 3;
  uint64 size = 4;
}

message FsEntry {
  string name = 1;
  string path = 2;
  bool is_file = 3;
  bool is_dir = 4;
  uint64 size = 5;
}

message FsList {
  string path = 1;
  repeated FsEntry entries = 2;
}

message FileChunk {
  bytes data = 1;
}

message WriteFileRequest {
  oneof payload {
    WriteFileTarget target = 1;
    FileChunk chunk = 2;
  }
}

message WriteFileTarget {
  string path = 1;
}

message FsWrite {
  string path = 1;
  uint64 bytes_written = 2;
}

message FsWriteRangeRequest {
  string path = 1;
  uint64 offset = 2;
  bytes data = 3;
}

message FsTruncateRequest {
  string path = 1;
  uint64 size = 2;
}

message FsDelete {
  string path = 1;
}

message FsRenameRequest {
  string from_path = 1;
  string to_path = 2;
}

message FsRename {
  string from_path = 1;
  string to_path = 2;
}

message FsCopyRequest {
  string from_path = 1;
  string to_path = 2;
}

message FsCopy {
  string from_path = 1;
  string to_path = 2;
  uint64 bytes_copied = 3;
}

message JobRunRequest {
  string command = 1;
  string cwd = 2;
  optional uint64 timeout_secs = 3;
  repeated string secrets = 4;
  reserved 5;
  reserved "has_timeout_secs";
}

message JobIdRequest {
  string job_id = 1;
}

message JobCancelRequest {
  string job_id = 1;
}

message JobLog {
  string stream = 1;
  bytes data = 2;
  uint64 sequence = 3;
}

message JobRecord {
  string id = 1;
  string node_id = 2;
  string command = 3;
  string cwd = 4;
  JobStatus status = 5;
  optional int32 exit_code = 6;
  reserved 7;
  reserved 8;
  reserved "has_exit_code";
  uint64 log_count = 9;
  bool logs_truncated = 10;
}

message JobList {
  repeated JobRecord jobs = 1;
  string next_page_token = 2;
}

message JobLogList {
  string job_id = 1;
  repeated JobLog logs = 2;
  bool truncated = 3;
  uint64 dropped_log_count = 4;
}

message JobLogSnapshot {
  string job_id = 1;
  repeated JobLog logs = 2;
  bool truncated = 3;
  uint64 dropped_log_count = 4;
  uint64 next_sequence = 5;
}

message JobLogEntry {
  string job_id = 1;
  JobLog log = 2;
}

message JobLogComplete {
  string job_id = 1;
  JobStatus status = 2;
  optional int32 exit_code = 3;
  uint64 log_count = 4;
  bool logs_truncated = 5;
  bool truncated = 6;
  uint64 dropped_log_count = 7;
}

message JobLogStreamEvent {
  oneof event {
    JobLogSnapshot snapshot = 1;
    JobLogEntry entry = 2;
    JobLogComplete complete = 3;
  }
}

message JobEvent {
  string job_id = 1;
  JobStatus status = 2;
  optional int32 exit_code = 3;
  reserved 4;
  reserved "has_exit_code";
  uint64 log_count = 5;
  bool logs_truncated = 6;
}

message JobStdinRequest {
  oneof payload {
    JobStdinTarget target = 1;
    FileChunk chunk = 2;
  }
}

message JobStdinTarget {
  string job_id = 1;
}

message JobStdin {
  string job_id = 1;
  uint64 bytes_written = 2;
}

message JobStdinClose {
  string job_id = 1;
  bool closed = 2;
}

message ServiceIdRequest {
  string service_id = 1;
}

message ServiceDefinition {
  string id = 1;
  string name = 2;
  string host = 3;
  uint32 port = 4;
  ServiceProtocol protocol = 5;
  string description = 6;
}

message ServiceList {
  repeated ServiceDefinition services = 1;
  string next_page_token = 2;
}

message ServiceCheck {
  string id = 1;
  bool ok = 2;
  uint64 latency_ms = 3;
  optional string reason = 4;
  reserved 5;
  reserved "has_reason";
}

message ServiceTunnelTarget {
  string service_id = 1;
}

message ServiceTunnelData {
  bytes data = 1;
}

message ServiceTunnelClose {
  string reason = 1;
}

message ServiceTunnelRequest {
  oneof payload {
    ServiceTunnelTarget target = 1;
    ServiceTunnelData data = 2;
    ServiceTunnelClose close = 3;
  }
}

message ServiceTunnelOpened {
  string service_id = 1;
  string host = 2;
  uint32 port = 3;
}

message ServiceTunnelResponse {
  oneof payload {
    ServiceTunnelOpened opened = 1;
    ServiceTunnelData data = 2;
    ServiceTunnelClose close = 3;
  }
}

message ServiceDatagramTunnelTarget {
  string service_id = 1;
}

message ServiceDatagram {
  string peer_id = 1;
  bytes data = 2;
}

message ServiceDatagramTunnelClose {
  string peer_id = 1;
  string reason = 2;
}

message ServiceDatagramTunnelRequest {
  oneof payload {
    ServiceDatagramTunnelTarget target = 1;
    ServiceDatagram datagram = 2;
    ServiceDatagramTunnelClose close = 3;
  }
}

message ServiceDatagramTunnelOpened {
  string service_id = 1;
  string host = 2;
  uint32 port = 3;
}

message ServiceDatagramTunnelResponse {
  oneof payload {
    ServiceDatagramTunnelOpened opened = 1;
    ServiceDatagram datagram = 2;
    ServiceDatagramTunnelClose close = 3;
  }
}

message AuditEvent {
  string subject = 1;
  uint64 timestamp_ms = 2;
  string node_id = 3;
  string capability = 4;
  string action = 5;
  string resource = 6;
  bool allowed = 7;
  string reason = 8;
  optional string run_id = 9;
  optional string step_id = 10;
  reserved 11, 12;
  reserved "has_run_id", "has_step_id";
}

message AuditLog {
  repeated AuditEvent events = 1;
  string next_page_token = 2;
}
