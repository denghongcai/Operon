syntax = "proto3";

package operon.runtime.v1;

service OperonRuntime {
  rpc Health(HealthRequest) returns (HealthStatus);
  rpc GetNode(GetNodeRequest) returns (NodeInfo);
  rpc ListCapabilities(ListCapabilitiesRequest) returns (CapabilityList);
  rpc ExplainCapability(CapabilityDiagnosticRequest) returns (PolicyDecision);
  rpc StatFs(FsPathRequest) returns (FsStat);
  rpc ListFs(FsListRequest) returns (FsList);
  rpc ReadFile(FsPathRequest) returns (stream FileChunk);
  rpc ReadFileRange(FsReadRangeRequest) returns (FileChunk);
  rpc WriteFile(stream WriteFileRequest) returns (FsWrite);
  rpc WriteFileRange(FsWriteRangeRequest) returns (FsWrite);
  rpc TruncateFs(FsTruncateRequest) returns (FsStat);
  rpc MkdirFs(FsPathRequest) returns (FsStat);
  rpc DeleteFs(FsPathRequest) returns (FsDelete);
  rpc RenameFs(FsRenameRequest) returns (FsRename);
  rpc CopyFs(FsCopyRequest) returns (FsCopy);
  rpc RunExec(ExecRunRequest) returns (ExecRecord);
  rpc GetExec(ExecIdRequest) returns (ExecRecord);
  rpc ListExecs(ListExecsRequest) returns (ExecList);
  rpc WatchExec(ExecIdRequest) returns (stream ExecEvent);
  rpc ListExecLogs(ExecIdRequest) returns (ExecLogList);
  rpc StreamExecLogs(ExecIdRequest) returns (stream ExecLogStreamEvent);
  rpc WriteExecStdin(stream ExecStdinRequest) returns (ExecStdin);
  rpc CloseExecStdin(ExecIdRequest) returns (ExecStdinClose);
  rpc CancelExec(ExecCancelRequest) returns (ExecRecord);
  rpc OpenExecSession(stream ExecSessionRequest) returns (stream ExecSessionEvent);
  rpc ListServices(ListServicesRequest) returns (ServiceList);
  rpc CheckService(ServiceIdRequest) returns (ServiceCheck);
  rpc OpenServiceTunnel(stream ServiceTunnelRequest) returns (stream ServiceTunnelResponse);
  rpc OpenServiceDatagramTunnel(stream ServiceDatagramTunnelRequest) returns (stream ServiceDatagramTunnelResponse);
  rpc ListAudit(ListAuditRequest) returns (AuditLog);
}

message HealthRequest {}

message GetNodeRequest {}

message ListCapabilitiesRequest {
  uint32 page_size = 1;
  string page_token = 2;
}

message ListExecsRequest {
  uint32 page_size = 1;
  string page_token = 2;
}

message ListServicesRequest {
  uint32 page_size = 1;
  string page_token = 2;
}

message ListAuditRequest {
  uint32 page_size = 1;
  string page_token = 2;
}

enum CapabilityKind {
  CAPABILITY_KIND_UNSPECIFIED = 0;
  CAPABILITY_KIND_FS = 1;
  CAPABILITY_KIND_PROCESS = 2;
  CAPABILITY_KIND_EXEC = 3;
  CAPABILITY_KIND_DEVICE_INFO = 4;
  CAPABILITY_KIND_SERVICE = 5;
}

enum ExecStatus {
  EXEC_STATUS_UNSPECIFIED = 0;
  EXEC_STATUS_RUNNING = 1;
  EXEC_STATUS_SUCCEEDED = 2;
  EXEC_STATUS_FAILED = 3;
  EXEC_STATUS_CANCELLED = 4;
  EXEC_STATUS_TIMED_OUT = 5;
}

enum ServiceProtocol {
  SERVICE_PROTOCOL_UNSPECIFIED = 0;
  SERVICE_PROTOCOL_TCP = 1;
  SERVICE_PROTOCOL_UDP = 2;
}

message HealthStatus {
  bool ok = 1;
  string node_id = 2;
  string version = 3;
}

message NodeInfo {
  string id = 1;
  string hostname = 2;
  string os = 3;
  string arch = 4;
}

message Capability {
  string id = 1;
  CapabilityKind kind = 2;
  string node_id = 3;
  string name = 4;
  repeated string permissions = 5;
  string description = 6;
}

message CapabilityList {
  repeated Capability capabilities = 1;
  string next_page_token = 2;
}

message CapabilityDiagnosticRequest {
  string capability_id = 1;
  string action = 2;
  string resource = 3;
  optional uint64 timeout_secs = 4;
}

message PolicyDecision {
  string subject = 1;
  string capability_id = 2;
  string action = 3;
  string resource = 4;
  bool allowed = 5;
  string reason_code = 6;
  string message = 7;
}

message FsPathRequest {
  string path = 1;
  optional FsPrecondition precondition = 2;
}

message FsListRequest {
  string path = 1;
  uint32 page_size = 2;
  string page_token = 3;
}

message FsStat {
  string path = 1;
  bool is_file = 2;
  bool is_dir = 3;
  uint64 size = 4;
  string version = 5;
}

message FsEntry {
  string name = 1;
  string path = 2;
  bool is_file = 3;
  bool is_dir = 4;
  uint64 size = 5;
  string version = 6;
}

message FsList {
  string path = 1;
  repeated FsEntry entries = 2;
  string next_page_token = 3;
}

message FileChunk {
  bytes data = 1;
}

message FsReadRangeRequest {
  string path = 1;
  uint64 offset = 2;
  uint32 size = 3;
}

message WriteFileRequest {
  oneof payload {
    WriteFileTarget target = 1;
    FileChunk chunk = 2;
  }
}

message WriteFileTarget {
  string path = 1;
  optional FsPrecondition precondition = 2;
  optional string expected_version = 3;
  bool require_absent = 4;
}

message FsWrite {
  string path = 1;
  uint64 bytes_written = 2;
  string version = 3;
}

message FsWriteRangeRequest {
  string path = 1;
  uint64 offset = 2;
  bytes data = 3;
  optional FsPrecondition precondition = 4;
  optional string expected_version = 5;
  bool require_absent = 6;
}

message FsTruncateRequest {
  string path = 1;
  uint64 size = 2;
  optional FsPrecondition precondition = 3;
  optional string expected_version = 4;
  bool require_absent = 5;
}

message FsDelete {
  string path = 1;
}

message FsRenameRequest {
  string from_path = 1;
  string to_path = 2;
  optional FsPrecondition from_precondition = 3;
  optional FsPrecondition to_precondition = 4;
  optional string from_expected_version = 5;
  optional string to_expected_version = 6;
  bool to_require_absent = 7;
}

message FsRename {
  string from_path = 1;
  string to_path = 2;
}

message FsCopyRequest {
  string from_path = 1;
  string to_path = 2;
  optional FsPrecondition from_precondition = 3;
  optional FsPrecondition to_precondition = 4;
  optional string from_expected_version = 5;
  optional string to_expected_version = 6;
  bool to_require_absent = 7;
}

message FsCopy {
  string from_path = 1;
  string to_path = 2;
  uint64 bytes_copied = 3;
  string version = 4;
}

message FsPrecondition {
  optional string expected_version = 1;
  bool require_absent = 2;
}

message ExecRunRequest {
  string command = 1;
  string cwd = 2;
  optional uint64 timeout_secs = 3;
  repeated string secrets = 4;
  reserved 5;
  reserved "has_timeout_secs";
  repeated string argv = 6;
}

message ExecIdRequest {
  string exec_id = 1;
}

message ExecCancelRequest {
  string exec_id = 1;
}

message ExecLog {
  string stream = 1;
  bytes data = 2;
  uint64 sequence = 3;
}

message ExecRecord {
  string id = 1;
  string node_id = 2;
  string command = 3;
  string cwd = 4;
  ExecStatus status = 5;
  optional int32 exit_code = 6;
  reserved 7;
  reserved 8;
  reserved "has_exit_code";
  uint64 log_count = 9;
  bool logs_truncated = 10;
}

message ExecList {
  repeated ExecRecord execs = 1;
  string next_page_token = 2;
}

message ExecLogList {
  string exec_id = 1;
  repeated ExecLog logs = 2;
  bool truncated = 3;
  uint64 dropped_log_count = 4;
}

message ExecLogSnapshot {
  string exec_id = 1;
  repeated ExecLog logs = 2;
  bool truncated = 3;
  uint64 dropped_log_count = 4;
  uint64 next_sequence = 5;
}

message ExecLogEntry {
  string exec_id = 1;
  ExecLog log = 2;
}

message ExecLogComplete {
  string exec_id = 1;
  ExecStatus status = 2;
  optional int32 exit_code = 3;
  uint64 log_count = 4;
  bool logs_truncated = 5;
  bool truncated = 6;
  uint64 dropped_log_count = 7;
}

message ExecLogStreamEvent {
  oneof event {
    ExecLogSnapshot snapshot = 1;
    ExecLogEntry entry = 2;
    ExecLogComplete complete = 3;
  }
}

message ExecEvent {
  string exec_id = 1;
  ExecStatus status = 2;
  optional int32 exit_code = 3;
  reserved 4;
  reserved "has_exit_code";
  uint64 log_count = 5;
  bool logs_truncated = 6;
}

message ExecStdinRequest {
  oneof payload {
    ExecStdinTarget target = 1;
    FileChunk chunk = 2;
  }
}

message ExecStdinTarget {
  string exec_id = 1;
}

message ExecStdin {
  string exec_id = 1;
  uint64 bytes_written = 2;
}

message ExecStdinClose {
  string exec_id = 1;
  bool closed = 2;
}

message ExecSessionRequest {
  oneof payload {
    ExecSessionStart start = 1;
    ExecSessionInput input = 2;
    ExecSessionResize resize = 3;
  }
}

message ExecSessionStart {
  string command = 1;
  string cwd = 2;
  optional uint64 timeout_secs = 3;
  repeated string secrets = 4;
  repeated string argv = 5;
  uint32 rows = 6;
  uint32 cols = 7;
}

message ExecSessionInput {
  bytes data = 1;
}

message ExecSessionResize {
  uint32 rows = 1;
  uint32 cols = 2;
}

message ExecSessionStarted {
  string exec_id = 1;
}

message ExecSessionOutput {
  string exec_id = 1;
  bytes data = 2;
}

message ExecSessionExit {
  string exec_id = 1;
  ExecStatus status = 2;
  optional int32 exit_code = 3;
}

message ExecSessionEvent {
  oneof event {
    ExecSessionStarted started = 1;
    ExecSessionOutput output = 2;
    ExecSessionExit exit = 3;
  }
}

message ServiceIdRequest {
  string service_id = 1;
}

message ServiceDefinition {
  string id = 1;
  string name = 2;
  string host = 3;
  uint32 port = 4;
  ServiceProtocol protocol = 5;
  string description = 6;
  ServicePermissions permissions = 7;
}

message ServicePermissions {
  bool check = 1;
  bool forward = 2;
}

message ServiceList {
  repeated ServiceDefinition services = 1;
  string next_page_token = 2;
}

message ServiceCheck {
  string id = 1;
  bool ok = 2;
  uint64 latency_ms = 3;
  optional string reason = 4;
  reserved 5;
  reserved "has_reason";
}

message ServiceTunnelTarget {
  string service_id = 1;
}

message ServiceTunnelData {
  bytes data = 1;
}

message ServiceTunnelClose {
  string reason = 1;
}

message ServiceTunnelRequest {
  oneof payload {
    ServiceTunnelTarget target = 1;
    ServiceTunnelData data = 2;
    ServiceTunnelClose close = 3;
  }
}

message ServiceTunnelOpened {
  string service_id = 1;
  string host = 2;
  uint32 port = 3;
}

message ServiceTunnelResponse {
  oneof payload {
    ServiceTunnelOpened opened = 1;
    ServiceTunnelData data = 2;
    ServiceTunnelClose close = 3;
  }
}

message ServiceDatagramTunnelTarget {
  string service_id = 1;
}

message ServiceDatagram {
  string peer_id = 1;
  bytes data = 2;
}

message ServiceDatagramTunnelClose {
  string peer_id = 1;
  string reason = 2;
}

message ServiceDatagramTunnelRequest {
  oneof payload {
    ServiceDatagramTunnelTarget target = 1;
    ServiceDatagram datagram = 2;
    ServiceDatagramTunnelClose close = 3;
  }
}

message ServiceDatagramTunnelOpened {
  string service_id = 1;
  string host = 2;
  uint32 port = 3;
}

message ServiceDatagramTunnelResponse {
  oneof payload {
    ServiceDatagramTunnelOpened opened = 1;
    ServiceDatagram datagram = 2;
    ServiceDatagramTunnelClose close = 3;
  }
}

message AuditEvent {
  string subject = 1;
  uint64 timestamp_ms = 2;
  string node_id = 3;
  string capability = 4;
  string action = 5;
  string resource = 6;
  bool allowed = 7;
  string reason = 8;
  optional string run_id = 9;
  optional string step_id = 10;
  reserved 11, 12;
  reserved "has_run_id", "has_step_id";
}

message AuditLog {
  repeated AuditEvent events = 1;
  string next_page_token = 2;
}
