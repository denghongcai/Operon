<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Operon full logo</title>
  <desc id="desc">Vector logo for Operon with a mesh control icon and hand-drawn geometric wordmark.</desc>

  <defs>
    <linearGradient id="operon-gradient" x1="48" y1="160" x2="336" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7CFF6B"/>
      <stop offset="50%" stop-color="#38E6C8"/>
      <stop offset="100%" stop-color="#3AA0FF"/>
    </linearGradient>

    <linearGradient id="operon-gradient-word" x1="626" y1="160" x2="696" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7CFF6B"/>
      <stop offset="55%" stop-color="#38E6C8"/>
      <stop offset="100%" stop-color="#3AA0FF"/>
    </linearGradient>
  </defs>

  <!-- Icon: centered at 192,160. All control points are symmetrical. -->
  <g id="operon-icon">
    <!-- open ring -->
    <path
      d="M 93.01 61.01 A 140 140 0 0 1 290.99 61.01
         M 290.99 258.99 A 140 140 0 0 1 93.01 258.99"
      stroke="url(#operon-gradient)"
      stroke-width="20"
      stroke-linecap="round"
    />

    <!-- horizontal operon chain -->
    <line x1="48" y1="160" x2="336" y2="160" stroke="url(#operon-gradient)" stroke-width="20" stroke-linecap="round"/>

    <!-- side nodes -->
    <circle cx="48" cy="160" r="24" fill="#0B0F14" stroke="url(#operon-gradient)" stroke-width="14"/>
    <circle cx="96" cy="160" r="24" fill="#0B0F14" stroke="url(#operon-gradient)" stroke-width="14"/>
    <circle cx="288" cy="160" r="24" fill="#0B0F14" stroke="url(#operon-gradient)" stroke-width="14"/>
    <circle cx="336" cy="160" r="24" fill="#0B0F14" stroke="url(#operon-gradient)" stroke-width="14"/>

    <!-- central controller -->
    <circle cx="192" cy="160" r="42" fill="#0B0F14" stroke="url(#operon-gradient)" stroke-width="20"/>
    <circle cx="192" cy="160" r="17" fill="url(#operon-gradient)"/>
  </g>

  <!-- Wordmark: manually drawn with SVG primitives; no fonts/text elements. -->
  <g id="operon-wordmark" stroke="#F7F8FA" stroke-width="14" stroke-linecap="square" stroke-linejoin="round">
    <!-- O -->
    <rect x="432" y="110" width="74" height="100" rx="24"/>

    <!-- P -->
    <path d="M 560 210 L 560 110 L 622 110 Q 646 110 646 140 Q 646 170 622 170 L 560 170"/>

    <!-- E, drawn as three bars; middle bar uses brand gradient -->
    <path d="M 708 110 L 780 110"/>
    <path d="M 708 210 L 780 210"/>
    <path d="M 708 160 L 780 160" stroke="url(#operon-gradient-word)"/>

    <!-- R -->
    <path d="M 842 210 L 842 110 L 904 110 Q 928 110 928 140 Q 928 170 904 170 L 842 170"/>
    <path d="M 893 170 L 934 210"/>

    <!-- O -->
    <rect x="988" y="110" width="74" height="100" rx="24"/>

    <!-- N -->
    <path d="M 1116 210 L 1116 110 L 1190 210 L 1190 110"/>
  </g>
</svg>
