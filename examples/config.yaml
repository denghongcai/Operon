version: 1

daemon:
  node_id: local
  grpc_listen: 127.0.0.1:7789
  workspace: /workspace
  advertise_lan: false
  store: store.jsonl
  auth:
    token: local-dev-token

client:
  nodes:
    local:
      endpoint: grpc://127.0.0.1:7789
      provider: manual
      auth:
        token: local-dev-token

policy:
  subject: local-cli
  fs:
    mounts:
      - name: workspace
        path: /
        permissions:
          read: true
          write: true
          delete: false
  job:
    allowed_cwds:
      - /
    default_timeout_secs: 30
    max_timeout_secs: 300
    preserve_env: false
    env_allowlist: []
    allowed_secrets: []
  service:
    services:
      - id: local-daemon
        name: local-daemon
        host: 127.0.0.1
        port: 7789
        protocol: tcp
        description: Operon gRPC daemon listener
        permissions:
          check: true
          forward: true
