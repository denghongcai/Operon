subject: docker-validation

fs:
  mounts:
    - name: workspace
      path: /
      permissions:
        read: true
        write: true
        delete: false

job:
  allowed_cwds:
    - /
  default_timeout_secs: 30
  max_timeout_secs: 30
  env_allowlist: []
  allowed_secrets:
    - OPERON_TEST_SECRET

service:
  services:
    - id: daemon
      name: daemon
      host: 127.0.0.1
      port: 7788
      protocol: tcp
      description: Operon daemon TCP listener
