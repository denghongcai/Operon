version: 1

daemon:
  node_id: node-a
  grpc_listen: 0.0.0.0:7789
  workspace: /workspace
  advertise_lan: true
  store: /etc/operon/operon-store.jsonl
  auth:
    token: docker-token

policy:
  subject: docker-validation
  fs:
    mounts:
      - name: workspace
        path: /
        permissions:
          read: true
          write: true
          delete: false
  job:
    allowed_cwds:
      - /
    default_timeout_secs: 30
    max_timeout_secs: 30
    preserve_env: false
    env_allowlist: []
    allowed_secrets:
      - OPERON_TEST_SECRET
  service:
    services:
      - id: daemon
        name: daemon
        host: 127.0.0.1
        port: 7789
        protocol: tcp
        description: Operon gRPC daemon listener
        permissions:
          check: true
          forward: true

secrets:
  file: /etc/operon/secrets.yaml
